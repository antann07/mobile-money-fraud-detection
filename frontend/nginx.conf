# ============================================================
# Nginx — reverse proxy for MTN MoMo Fraud Detection
# ============================================================
# Serves the React SPA and proxies /api to Flask/Gunicorn.
# Runs inside the frontend Docker container on port 80.
# ============================================================

# ── Rate-limiting zones (defined outside server block) ────────
# api zone  — 30 req/min per IP for all API calls
# upload zone — 5 req/min per IP for screenshot uploads (expensive)
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

# ── Upstream (Docker Compose service name) ────────────────────
upstream flask_backend {
    server backend:5001;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Global upload limit (screenshots up to 10 MB) ─────
    client_max_body_size 10m;

    # ── Gzip compression ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        image/svg+xml;

    # ── Security headers ─────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Hide Nginx version ────────────────────────────────
    server_tokens off;

    # ── API reverse proxy ─────────────────────────────────
    location /api/ {
        # Rate-limit all API calls; allow small bursts (e.g. page load)
        limit_req zone=api burst=15 nodelay;
        limit_req_status 429;
        proxy_pass         http://flask_backend;
        proxy_redirect     off;

        # Forward real client info to Flask
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — allow slow OCR processing
        proxy_connect_timeout  10s;
        proxy_read_timeout     120s;
        proxy_send_timeout     120s;

        # Disable buffering for streaming responses (if needed later)
        proxy_buffering on;
        proxy_buffer_size   16k;
        proxy_buffers       4 32k;
    }

    # ── Screenshot upload endpoint — tighter rate limit ──────
    location /api/message-checks/upload-screenshot {
        limit_req zone=upload burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://flask_backend;
        proxy_redirect     off;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_read_timeout     120s;
        proxy_send_timeout     120s;

        proxy_buffering on;
        proxy_buffer_size   16k;
        proxy_buffers       4 32k;
    }

    # ── Nginx status (internal health monitoring only) ────────
    # Accessible inside the container; not exposed to the internet.
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny  all;
        access_log off;
    }

    # ── Vite hashed assets (JS, CSS, images) ──────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Favicon / robots — avoid 404 noise in logs ───────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── SPA fallback ──────────────────────────────────────
    # Any path that doesn't match a real file → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Custom error pages ────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
