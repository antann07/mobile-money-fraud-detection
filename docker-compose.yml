# ============================================================
# MTN Mobile Money Fraud Detection — Docker Compose
# ============================================================
# Three services:
#   frontend  — Nginx serving the React SPA, proxies /api to backend
#   backend   — Flask + Gunicorn (PostgreSQL mode)
#   db        — PostgreSQL 16
#
# Usage:
#   1. Copy .env.example to .env and edit values
#   2. docker compose up --build -d
#   3. Open http://localhost:3000
#
# Tear down (keep data):  docker compose down
# Tear down (nuke data):  docker compose down -v
# ============================================================

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-momo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-fraud_detection}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-momo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Prevent OOM kills with sensible shared memory
    shm_size: 128mb
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Flask Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./flask_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-momo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fraud_detection}
      UPLOAD_DIR: /app/uploads/screenshots
      MODEL_DIR: /app/ml_models
      LOG_DIR: /app/logs
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TOKEN_EXPIRY_HOURS: ${TOKEN_EXPIRY_HOURS:-24}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-1}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_FROM: ${MAIL_DEFAULT_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - uploads:/app/uploads
      - ml_models:/app/ml_models
      - backend_logs:/app/logs
    expose:
      - "5001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ── React Frontend (Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty string → SPA calls /api on same origin, Nginx proxies to backend
        VITE_API_BASE: ""
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:80"

# ── Named volumes ────────────────────────────────────────────
volumes:
  pg_data:         # PostgreSQL data — survives container restarts
  uploads:         # User screenshot uploads
  ml_models:       # Trained .pkl model files
  backend_logs:    # Application and audit logs
